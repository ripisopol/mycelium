<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0b08"/>
  
  <!-- Mycelium threads -->
  <line x1="16" y1="16" x2="5" y2="8"  stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="27" y2="7"  stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="28" y2="20" stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="18" y2="28" stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="7"  y2="26" stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="16" y1="16" x2="4"  y2="18" stroke="#5ecba1" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Secondary threads (branching) -->
  <line x1="5"  y1="8"  x2="9"  y2="3"  stroke="#5ecba1" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="27" y1="7"  x2="29" y2="13" stroke="#5ecba1" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="28" y1="20" x2="24" y2="27" stroke="#5ecba1" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="7"  y1="26" x2="3"  y2="22" stroke="#5ecba1" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Outer nodes -->
  <circle cx="5"  cy="8"  r="1.5" fill="#5ecba1" opacity="0.6"/>
  <circle cx="27" cy="7"  r="1.5" fill="#5ecba1" opacity="0.6"/>
  <circle cx="28" cy="20" r="1.5" fill="#5ecba1" opacity="0.6"/>
  <circle cx="18" cy="28" r="1.5" fill="#5ecba1" opacity="0.6"/>
  <circle cx="7"  cy="26" r="1.5" fill="#5ecba1" opacity="0.6"/>
  <circle cx="4"  cy="18" r="1.5" fill="#5ecba1" opacity="0.6"/>

  <!-- Center node (glowing) -->
  <circle cx="16" cy="16" r="4" fill="#5ecba1" opacity="0.15"/>
  <circle cx="16" cy="16" r="2.5" fill="#5ecba1" opacity="0.9"/>
</svg>
